<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Known — Finally known.</title>
  <meta name="description" content="The AI that truly knows you." />
  <style>body{background:#070706;}</style>
  <script>
    // A/B test: cookie-based 50/50 split
    // Returning visitors always see the same variant
    function getVariant() {
      const match = document.cookie.match(/known_ab=([ab])/);
      if (match) return match[1];
      const variant = Math.random() < 0.5 ? 'a' : 'b';
      document.cookie = `known_ab=${variant};path=/;max-age=${60*60*24*30}`;
      return variant;
    }
    const v = getVariant();
    window.location.replace('/' + v + '.html');
  </script>
</head>
<body></body>
</html>
